spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.*"
    listener:
      ack-mode: manual_immediate

# AWS region and credentials.
# Credentials are resolved at runtime via DefaultCredentialsProvider:
#   Locally  → AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY environment variables
#   On EC2   → EC2 Instance Profile (IAM Role)
#   On ECS   → ECS Task Role
cloud:
  aws:
    region:
      static: ap-south-1
    credentials:
      profile-name: ${AWS_PROFILE:notification-user}

notification:
  # ── SQS queue URLs ────────────────────────────────────────────────────────
  queue:
    order-confirmed: https://sqs.ap-south-1.amazonaws.com/403884279375/order-confirmed-queue
    order-cancelled: https://sqs.ap-south-1.amazonaws.com/403884279375/order-cancelled-queue
    order-failed:    https://sqs.ap-south-1.amazonaws.com/403884279375/order-failed-queue

  # ── Email settings (AWS SES) ──────────────────────────────────────────────
  email:
    # The From address shown to the recipient.
    # This address MUST be verified in AWS SES (Verified Identities) before
    # any email can be sent. In sandbox mode the To address must also be verified.
    sender: manickamletchu@gmail.com

server:
  port: 8082
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: true

logging:
  level:
    com.example.notificationservice: DEBUG
    org.springframework.kafka: INFO
    io.awspring.cloud: INFO
